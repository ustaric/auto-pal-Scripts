services:
  palworld:
    image: thijsvanloef/palworld-server-docker:latest
    container_name: palworld-server
    # [권장] 서버 종료 시 데이터 저장 및 정리를 위해 넉넉한 시간을 줍니다.
    stop_grace_period: 30s
    ports:
      - 8211:8211/udp
      - 27015:27015/udp
      - 25575:25575/tcp
      - 8212:8212/tcp
    environment:
      - TZ=Asia/Seoul
      # [권장] 파일 권한 문제를 방지하기 위해 일반 유저 ID를 지정합니다.
      - PUID=1000
      - PGID=1000
    env_file:
      - .env  # 게임 내부 설정이 들어있는 파일
    volumes:
      # [필수] 현재 폴더의 palworld 폴더를 컨테이너 내부와 연결합니다.
      - ./palworld:/palworld/
    
    # --- 헬스체크(Healthcheck) 설정 추가 ---
    healthcheck:
      # 컨테이너 내부에서 RCON 포트(25575)가 활성화되어 열려 있는지 확인합니다.
      test: ["CMD-SHELL", "timeout 5s bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/25575' || exit 1"]
      # 10초마다 헬스체크를 수행합니다.
      interval: 10s
      # 확인 시도 후 응답 대기 시간은 최대 5초입니다.
      timeout: 5s
      # 3번 연속 실패하면 'unhealthy'로 간주합니다.
      retries: 3
      # 초기 서버 구동 시(세이브 로드 등) 가동 준비 시간을 고려하여 첫 60초 동안은 검사 실패를 무시합니다.
      start_period: 60s